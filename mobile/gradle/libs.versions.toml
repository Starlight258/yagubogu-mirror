# Build Tools & Plugins
agp = "8.12.3"
kotlin = "2.3.0"
ksp = "2.3.6"
ktlint = "13.0.0"
googleServices = "4.4.3"
firebaseCrashlytics = "3.0.5"

# AndroidX Core
coreKtx = "1.16.0"
coreSplashscreen = "1.2.0"
appcompat = "1.7.1"
activity = "1.10.1"
activityCompose = "1.10.1"
fragmentKtx = "1.8.8"
datastorePreferences = "1.2.1"
credentials = "1.5.0"

# AndroidX Lifecycle
lifecycleRuntime = "2.10.0"
lifecycleViewmodelNav3 = "2.10.0"

# Compose
composeBom = "2025.08.01"

# Navigation3
nav3Core = "1.0.0"
multiplatform-nav3-ui = "1.0.0-alpha06"

# Koin
koin-bom = "4.2.0-RC1"

# Ktor & Ktorfit
ktor = "3.4.0"
ktorfit = "2.7.2"

# Kotlinx
kotlinxSerializationJson = "1.10.0"
kotlinxDatetime = "0.7.1"
kotlinxCoroutinesTest = "1.10.2"

# Firebase
firebaseBom = "34.0.0"

# Google Services
googleidVersion = "1.1.1"
playServicesLocation = "21.3.0"

# Oss-licenses
aboutLibraries = "13.2.1"

# Play In-App Update
appUpdate = "2.1.0"

# Image Loading
coilCompose = "3.3.0"
imagepickerkmp = "1.0.34"
compressor = "3.0.1"
zoomable = "2.11.1"

# UI Components
material = "1.12.0"
calendar = "2.10.0"

# Logging
kermit = "2.0.8"

# Testing
junit = "4.13.2"

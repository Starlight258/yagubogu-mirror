name: YaguBogu Backend Dev

on:
  push:
    branches: [ "dev" ]
    paths:
      - "backend/app/**"
  workflow_dispatch:

env:
  IMAGE: yagubogu/yagubogu-backend

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./backend
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Tests
        run: ./gradlew :app:test --no-daemon

  build:
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4  # ✅ 이게 있어야 ./backend 가 생김

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Docker Image Build & Push (amd64)
        run: |
          TAG_LATEST="dev-latest"
          # 빌드 컨텍스트: backend/ (Gradle 루트), Dockerfile: app/Dockerfile
          docker buildx build \
          --cache-to=type=registry,ref=$IMAGE:build-cache,mode=max \
          --cache-from=type=registry,ref=$IMAGE:build-cache \
          -f app/Dockerfile \
          --platform linux/amd64 \
          -t $IMAGE:$TAG_LATEST \
          --push \
          .

  cd:
    needs: build
    runs-on: [ self-hosted, develop ]
    env:
      IMAGE: yagubogu/yagubogu-backend
      TAG: "dev-latest"
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Pull Docker image
        run: |
          echo "Docker 이미지 pull 시작"
          docker pull $IMAGE:$TAG
          echo "Docker 이미지 pull 완료"

      - name: Stop & Remove existing container (by name)
        run: |
          set -e
          NAME="yagubogu-backend-dev"
          if [ "$(docker ps -q -f name=^/${NAME}$)" ]; then
            echo "실행중 컨테이너 중지: $NAME"
            docker stop $NAME
          fi
          if [ "$(docker ps -aq -f name=^/${NAME}$)" ]; then
            echo "기존 컨테이너 제거: $NAME"
            docker rm $NAME
          fi
          echo "포트 8080 점유 프로세스 확인 및 정리"
          sudo fuser -k -n tcp 8080 || true

      - name: Run docker container
        run: |
          set -e
          NAME="yagubogu-backend-dev"
          echo "새 Docker 컨테이너 실행..."
          docker run -d \
            --name $NAME \
            --restart unless-stopped \
            --network yagubogu-net \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e ADMIN_GOOGLE_CLIENT_ID="${{ secrets.ADMIN_GOOGLE_CLIENT_ID }}" \
            -e APPLE_CLIENT_ID="${{ secrets.APPLE_CLIENT_ID }}" \
            -e ACCESS_TOKEN_SECRET_KEY="${{ secrets.ACCESS_TOKEN_SECRET_KEY_DEV }}" \
            -e REFRESH_TOKEN_SECRET_KEY="${{ secrets.REFRESH_TOKEN_SECRET_KEY }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e OCI_S3_ENDPOINT="${{ secrets.OCI_S3_ENDPOINT }}" \
            -e OCI_REGION="${{ secrets.OCI_REGION }}" \
            -e OCI_S3_BUCKET="${{ secrets.OCI_S3_BUCKET }}" \
            -e DEFAULT_PROFILE_IMAGE_URL="${{ secrets.DEFAULT_PROFILE_IMAGE_URL }}" \
            -e R2_S3_ENDPOINT="${{ secrets.R2_S3_ENDPOINT }}" \
            -e R2_REGION="${{ secrets.R2_REGION }}" \
            -e R2_S3_BUCKET="${{ secrets.R2_S3_BUCKET }}" \
            -e R2_PUBLIC_BASE_URL="${{ secrets.R2_PUBLIC_BASE_URL || 'https://images.yagubogu.com' }}" \
            -e R2_DEFAULT_PROFILE_IMAGE_URL="${{ secrets.R2_DEFAULT_PROFILE_IMAGE_URL || 'https://images.yagubogu.com/images/defaults/profile.png' }}" \
            $IMAGE:$TAG
          
          echo "컨테이너 실행 완료."  

      - name: Docker image Prune
        run: |
          echo "사용하지 않는 Docker 이미지 정리 중..."
          docker image prune -af || true
          echo "이미지 정리 완료"

name: YaguBogu Crawling Release & Deploy (Auto SemVer)

on:
  pull_request_target:
    types: [ closed ]
    branches: [ "main" ]
    paths:
      - "backend/crawling/**"
      - "backend/app/**"
      - "backend/build.gradle"
      - "backend/settings.gradle"
      - "backend/gradle/**"
      - "backend/gradlew"
  workflow_dispatch:

env:
  IMAGE: yagubogu/yagubogu-crawling

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      next_version: ${{ steps.semver.outputs.next_version }}
      next_version_with_v: ${{ steps.ver.outputs.next_version_with_v }}
      digest: ${{ steps.capture.outputs.digest }}
      img_tag: ${{ steps.alias.outputs.image_tag }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Build & Push main-latest (amd64)
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --cache-to=type=registry,ref=$IMAGE:build-cache,mode=max \
            --cache-from=type=registry,ref=$IMAGE:build-cache \
            -f backend/crawling/Dockerfile.main \
            --platform linux/amd64 \
            -t $IMAGE:main-latest \
            --push \
            backend

      - id: semver
        name: Decide bump from PR labels -> compute next version
        shell: bash
        run: |
          set -euo pipefail
          labels_raw="$(jq -r '.pull_request.labels[].name' <<< '${{ toJson(github.event) }}' || true)"
          labels="$(sed -E 's/^[^[:alnum:]]+[ ]*//;t;:a;s/^[^[:alnum:]]+[ ]*//;ta' <<<"$labels_raw")"
          if   grep -qi '^semver:major$' <<<"$labels"; then bump="major"
          elif grep -qi '^semver:minor$' <<<"$labels"; then bump="minor"
          else bump="patch"; fi

          git fetch --tags --force
          last_tag="$(git tag -l --sort=-v:refname | grep -E '^crawl-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          last_tag="${last_tag#crawl-v}"
          [ -n "$last_tag" ] || last_tag="0.0.0"
          IFS='.' read -r MA MI PA <<<"$last_tag"

          case "$bump" in
            major) MA=$((MA+1)); MI=0; PA=0;;
            minor) MI=$((MI+1)); PA=0;;
            patch) PA=$((PA+1));;
          esac
          next="$MA.$MI.$PA"
          echo "next_version=$next" >> "$GITHUB_OUTPUT"

      - id: ver
        name: Export crawl-v-prefixed VER
        shell: bash
        run: |
          set -euo pipefail
          VER="crawl-v${{ steps.semver.outputs.next_version }}"
          echo "VER=$VER" >> "$GITHUB_ENV"
          echo "next_version_with_v=$VER" >> "$GITHUB_OUTPUT"

      - name: Create Git tag (crawl-v-prefixed)
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.next_version_with_v }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$VER" >/dev/null; then
            echo "Tag $VER already exists. Skip."
          else
            git tag -a "$VER" -m "Release $VER (auto)"
            git push origin "$VER"
          fi

      - id: capture
        name: Capture image digest of main-latest
        shell: bash
        run: |
          set -euo pipefail
          DIGEST=""
          for i in {1..10}; do
            DIGEST="$(docker buildx imagetools inspect "$IMAGE:main-latest" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1 || true)"
            [ -n "$DIGEST" ] && break
            echo "waiting manifest... ($i/10)"; sleep 3
          done
          [ -n "$DIGEST" ] || { echo "Digest not found for $IMAGE:main-latest" >&2; exit 1; }
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - id: alias
        name: Create readable alias tag <VER>-<short>
        shell: bash
        run: |
          set -euo pipefail
          DIGEST="$(docker buildx imagetools inspect "$IMAGE:main-latest" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
          SHORT="${DIGEST#sha256:}"
          SHORT="${SHORT:0:8}"
          READABLE="${{ steps.ver.outputs.next_version_with_v }}-${SHORT}"
          docker buildx imagetools create \
            -t "$IMAGE:$READABLE" \
            "$IMAGE:main-latest"
          echo "image_tag=$READABLE" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  cd:
    needs: release
    runs-on: [ self-hosted, production ]
    env:
      IMAGE: yagubogu/yagubogu-crawling
      NEXT_VERSION: ${{ needs.release.outputs.next_version }}
      NEXT_VERSION_WITH_V: ${{ needs.release.outputs.next_version_with_v }}
      DIGEST: ${{ needs.release.outputs.digest }}
      IMG_TAG: ${{ needs.release.outputs.img_tag }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Pull by digest (pinned)
        run: docker pull "$IMAGE@${DIGEST}"

      - name: Ensure network
        run: docker network create yagubogu-net 2>/dev/null || true

      - name: Stop & Remove existing container
        shell: bash
        run: |
          set -euo pipefail
          NAME="yagubogu-crawling-prod"
          if [ "$(docker ps -q -f name=^/${NAME}$)" ]; then
            docker stop "$NAME"
          fi
          if [ "$(docker ps -aq -f name=^/${NAME}$)" ]; then
            docker rm "$NAME"
          fi

      - name: Run docker container
        shell: bash
        run: |
          set -euo pipefail
          NAME="yagubogu-crawling-prod"
          docker run -d \
            --name "$NAME" \
            --restart unless-stopped \
            --network yagubogu-net \
            -v /var/log/yagubogu:/var/log/yagubogu \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_URL="${{ secrets.DB_PROD_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e PLAYWRIGHT_HEADLESS=true \
            -e PLAYWRIGHT_SLOW_MO=0 \
            -l app=yagubogu-crawling \
            -l release.version="${NEXT_VERSION_WITH_V}" \
            -l release.digest="${DIGEST}" \
            -l release.alias="${IMG_TAG}" \
            "$IMAGE@${DIGEST}"

      - name: Prune old images (local)
        shell: bash
        run: docker image prune -af || true

name: Mirror to personal repo

# fork 레포의 모든 브랜치를 개인 미러 레포로 복제해서 잔디를 채운다.
on:
  schedule:
    # cron은 UTC 기준. KST 오전 8시 = UTC 전날 23시
    - cron: '0 23 * * *'
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행도 가능

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 (얕은 클론 방지)

      - name: Mirror push to personal repo
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          set -e
          # origin의 모든 원격 브랜치를 가져온다 (체크아웃된 브랜치는 건드리지 않음)
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          git fetch origin --tags

          # 미러 레포를 리모트로 추가 (토큰 포함 URL)
          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/Starlight258/yagubogu-mirror.git"

          # origin의 모든 브랜치를 미러 레포의 같은 이름 브랜치로 push
          git push --force mirror 'refs/remotes/origin/*:refs/heads/*'
          git push --force --tags mirror

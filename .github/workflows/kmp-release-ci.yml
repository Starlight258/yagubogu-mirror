name: YaguBogu KMP Release CI

on:
  push:
    branches: [ "dev" ]
    paths: [ "mobile/**" ]
  pull_request:
    branches: [ "dev" ]
    paths: [ "mobile/**" ]
  workflow_dispatch:

env:
  GOOGLE_SERVICES_JSON_RELEASE: ${{ secrets.GOOGLE_SERVICES_JSON_RELEASE }}
  IOS_CONFIG_XCCONFIG: ${{ secrets.IOS_CONFIG_XCCONFIG }}

jobs:
  lint-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle  # Gradle 의존성 캐시
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run ktlint check
        run: ./gradlew ktlintCheck

  android-release-build:
    needs: lint-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle  # Gradle 의존성 캐시

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json (Release)
        run: |
          mkdir -p ./composeApp
          echo "$GOOGLE_SERVICES_JSON_RELEASE" | base64 --decode > ./composeApp/google-services.json

      - name: Android Release Build
        run: |
          ./gradlew clean :composeApp:assembleRelease

  ios-release-build:
    needs: lint-check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle  # Gradle 의존성 캐시

      # Kotlin/Native 컴파일러 캐시
      # 툴체인 바이너리이므로 릴리즈 결과물에 영향 없음
      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      # SPM 패키지 캐시 (~/.swiftpm 만)
      # DerivedData는 이전 빌드 산출물이 포함되므로 제외
      # ~/.swiftpm 은 패키지 소스 다운로드 캐시이므로 안전
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore iOS Config.xcconfig
        run: |
          mkdir -p iosApp/Configuration
          echo "$IOS_CONFIG_XCCONFIG" | base64 --decode > iosApp/Configuration/Config.xcconfig

      - name: Resolve Xcode Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project iosApp/iosApp.xcodeproj -scheme iosApp

      - name: iOS Release Logic Test
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      - name: iOS Release Framework Build
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Xcode Project Build Check (Release)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

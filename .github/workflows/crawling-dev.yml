name: YaguBogu Crawling Dev

on:
  push:
    branches: [ "dev" ]
    paths:
      - "backend/crawling/**"
      - "backend/app/**"
      - "backend/build.gradle"
      - "backend/settings.gradle"
      - "backend/gradle/**"
      - "backend/gradlew"
  workflow_dispatch:

env:
  IMAGE: yagubogu/yagubogu-crawling

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./backend
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Crawling Tests
        run: ./gradlew :crawling:test --no-daemon

  build:
    needs: ci
    runs-on: ubuntu-22.04-arm
    defaults:
      run:
        shell: bash
        working-directory: ./backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Docker Image Build & Push (arm64-arch)
        run: |
          TAG_LATEST="dev-latest"
          docker buildx build \
          --cache-to=type=registry,ref=$IMAGE:build-cache,mode=max \
          --cache-from=type=registry,ref=$IMAGE:build-cache \
          -f crawling/Dockerfile.dev \
          --platform linux/arm64 \
          -t $IMAGE:$TAG_LATEST \
          --push \
          .

  cd:
    needs: build
    runs-on: [ self-hosted, develop ]
    env:
      IMAGE: yagubogu/yagubogu-crawling
      TAG: "dev-latest"
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_DEPLOY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOY_TOKEN }}

      - name: Pull Docker image
        run: |
          echo "Docker 이미지 pull 시작"
          docker pull $IMAGE:$TAG
          echo "Docker 이미지 pull 완료"

      - name: Ensure network
        run: docker network create yagubogu-net 2>/dev/null || true

      - name: Stop & Remove existing container
        run: |
          set -e
          NAME="yagubogu-crawling-dev"
          if [ "$(docker ps -q -f name=^/${NAME}$)" ]; then
            echo "실행중 컨테이너 중지: $NAME"
            docker stop $NAME
          fi
          if [ "$(docker ps -aq -f name=^/${NAME}$)" ]; then
            echo "기존 컨테이너 제거: $NAME"
            docker rm $NAME
          fi

      - name: Run docker container
        run: |
          set -e
          NAME="yagubogu-crawling-dev"
          echo "새 Docker 컨테이너 실행..."
          docker run -d \
            --name $NAME \
            --restart unless-stopped \
            --network yagubogu-net \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e PLAYWRIGHT_HEADLESS=true \
            -e PLAYWRIGHT_SLOW_MO=0 \
            $IMAGE:$TAG

          echo "컨테이너 실행 완료."

      - name: Docker image Prune
        run: |
          echo "사용하지 않는 Docker 이미지 정리 중..."
          docker image prune -af || true
          echo "이미지 정리 완료"
